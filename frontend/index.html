<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ASL Emergency Translator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="status-bar">
    <span id="connection-dot"></span>
    <span id="connection-label">Connecting...</span>
  </div>

  <div id="camera-container">
    <video id="preview" autoplay muted playsinline></video>
    <div id="recording-overlay" class="hidden">
      <span id="recording-label">REC</span>
    </div>
  </div>

  <div id="hint-card">
    <p id="hint-text">Keep both hands and your upper body fully inside the frame.</p>
    <button id="camera-btn" type="button">Use Rear Camera</button>
  </div>

  <div id="button-area">
    <button id="record-btn" disabled>
      <span id="btn-label">Tap to Record</span>
    </button>
    <svg id="progress-ring" viewBox="0 0 120 120">
      <circle id="ring-track" cx="60" cy="60" r="54" />
      <circle id="ring-fill" cx="60" cy="60" r="54" />
    </svg>
  </div>

  <div id="result-card" class="hidden">
    <p id="result-text"></p>
    <p id="result-meta"></p>
    <button id="again-btn">Sign Again</button>
  </div>

  <div id="spinner" class="hidden">
    <div class="spin"></div>
    <p id="spinner-label">Translating...</p>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
